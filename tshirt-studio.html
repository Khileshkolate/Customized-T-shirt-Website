<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreadCraft Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz@9..40;wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --deep:#060810;--base:#0A0D15;--surface:#0E1219;--elevated:#12161F;
  --card:#161B26;--hover:#1C2233;--border:#1E2538;--border2:#2A3348;
  --t1:#D4D8E3;--t2:#7B8298;--t3:#454D66;--muted:#2D3550;
  --accent:#38BDF8;--accent2:#818CF8;--accent-bg:#38BDF812;--accent-glow:#38BDF830;
  --green:#34D399;--orange:#F59E0B;--red:#EF4444;--pink:#EC4899;
  --radius:10px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--t1)}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{
  display:flex;align-items:center;padding:0 24px;height:56px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:16px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-badge{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,#38BDF8,#818CF8);
  display:grid;place-items:center;font:700 15px/1 'Sora';color:#fff;
}
.brand h1{font:700 15px/1 'Sora';color:var(--accent);letter-spacing:.4px}
.brand small{font:500 9px/1 'DM Sans';color:var(--t3);letter-spacing:2.5px;text-transform:uppercase}

/* TABS */
.nav-tabs{display:flex;gap:2px;margin-left:32px;background:var(--elevated);border-radius:8px;padding:3px}
.nav-tab{
  padding:7px 18px;border-radius:6px;border:none;background:transparent;
  color:var(--t2);font:500 12px/1 'DM Sans';cursor:pointer;transition:all .2s;
  letter-spacing:.3px;
}
.nav-tab:hover{color:var(--t1)}
.nav-tab.active{background:var(--accent);color:#fff}

.topbar-right{margin-left:auto;display:flex;gap:6px}
.top-btn{
  padding:6px 12px;border-radius:7px;border:1px solid var(--border);
  background:var(--elevated);color:var(--t2);cursor:pointer;
  font:500 12px/1 'DM Sans';display:flex;align-items:center;gap:5px;transition:all .15s;
}
.top-btn:hover{border-color:var(--border2);color:var(--t1);background:var(--hover)}
.top-btn.primary{border-color:var(--accent);color:var(--accent)}
.top-btn.primary:hover{background:var(--accent-bg)}
.top-btn.warn:hover{color:var(--red);border-color:#EF444444}

.main{flex:1;overflow:hidden;position:relative}

/* ══════════ PAGE: ADMIN ══════════ */
.page{position:absolute;inset:0;overflow-y:auto;display:none;padding:28px 32px}
.page.active{display:block}

.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.admin-header h2{font:600 20px/1 'Sora';color:var(--t1)}
.admin-header p{font-size:13px;color:var(--t2);margin-top:6px}

.upload-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;
}
.mockup-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;transition:all .2s;
}
.mockup-card:hover{border-color:var(--border2)}
.mockup-card .card-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.mockup-card .card-title{font:600 13px/1 'DM Sans';color:var(--t1)}
.mockup-card .card-sub{font-size:11px;color:var(--t3);margin-top:3px}
.card-badge{
  font:600 10px/1 'JetBrains Mono';padding:3px 8px;border-radius:20px;
}
.card-badge.uploaded{background:#34D39918;color:var(--green)}
.card-badge.pending{background:#F59E0B18;color:var(--orange)}
.mockup-preview{
  height:200px;display:flex;align-items:center;justify-content:center;
  background:var(--elevated);position:relative;overflow:hidden;
}
.mockup-preview img{max-height:100%;max-width:100%;object-fit:contain}
.mockup-preview .placeholder{text-align:center;color:var(--t3)}
.mockup-preview .placeholder .ph-icon{font-size:36px;margin-bottom:8px;opacity:.5}
.mockup-preview .placeholder p{font-size:11px}
.card-actions{padding:12px 16px;display:flex;gap:8px}
.card-btn{
  flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);
  background:var(--elevated);color:var(--t2);font:500 11px/1 'DM Sans';
  cursor:pointer;text-align:center;transition:all .15s;
}
.card-btn:hover{border-color:var(--border2);color:var(--t1)}
.card-btn.upload-btn{border-color:var(--accent);color:var(--accent)}
.card-btn.upload-btn:hover{background:var(--accent-bg)}
.card-btn.remove-btn:hover{color:var(--red);border-color:#EF444444}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-label{font:500 11px/1 'DM Sans';color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-right:4px}
.filter-chip{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--t2);font:500 12px/1 'DM Sans';
  cursor:pointer;transition:all .15s;
}
.filter-chip:hover{border-color:var(--border2);color:var(--t1)}
.filter-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

.color-dot-small{
  width:14px;height:14px;border-radius:50%;display:inline-block;
  vertical-align:middle;margin-right:4px;border:1px solid var(--border);
}

/* Stats row */
.stats-row{display:flex;gap:12px;margin-bottom:20px}
.stat-card{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:16px;
}
.stat-card .stat-val{font:700 24px/1 'JetBrains Mono';color:var(--accent);margin-bottom:4px}
.stat-card .stat-label{font:500 11px/1 'DM Sans';color:var(--t3);letter-spacing:.5px}

/* ══════════ PAGE: DESIGNER ══════════ */
.designer{display:flex;height:100%}

/* Left panel */
.d-left{
  width:268px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.d-left::-webkit-scrollbar{width:4px}
.d-left::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.d-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.d-label{
  font:600 9px/1 'DM Sans';color:var(--t3);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:10px;
}

.type-row{display:flex;gap:6px}
.type-chip{
  flex:1;padding:9px 4px;border-radius:var(--radius);border:1.5px solid var(--border);
  background:var(--elevated);color:var(--t2);cursor:pointer;text-align:center;
  transition:all .2s;font-family:'DM Sans',sans-serif;
}
.type-chip:hover{border-color:var(--border2)}
.type-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);box-shadow:0 0 12px var(--accent-glow)}
.type-chip .tc-icon{font-size:20px}
.type-chip .tc-name{font-size:10px;font-weight:500;margin-top:2px}

.color-row{display:flex;flex-wrap:wrap;gap:7px}
.color-sw{
  width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;
  transition:all .2s;position:relative;
}
.color-sw:hover{transform:scale(1.15)}
.color-sw.active{border-color:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.color-sw.is-light{box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.color-sw.no-img::after{
  content:'!';position:absolute;top:-4px;right:-4px;width:14px;height:14px;
  border-radius:50%;background:var(--orange);color:#000;font-size:9px;font-weight:700;
  display:grid;place-items:center;
}

.zone-row{display:flex;gap:6px}
.zone-chip{
  flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);
  background:transparent;color:var(--t2);cursor:pointer;font:500 12px/1 'DM Sans';
  text-align:center;transition:all .2s;
}
.zone-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.zone-chip.disabled{opacity:.35;pointer-events:none}

.tool-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.tool-btn{
  padding:11px 4px;border-radius:var(--radius);border:1.5px solid var(--border);
  background:var(--elevated);color:var(--t2);cursor:pointer;text-align:center;
  transition:all .2s;font-family:'DM Sans',sans-serif;
}
.tool-btn:hover{border-color:var(--border2);color:var(--t1)}
.tool-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.tool-btn .ti{font-size:18px;margin-bottom:2px}
.tool-btn .tl{font:600 9px/1 'DM Sans';letter-spacing:.3px;text-transform:uppercase}

.text-opts{
  background:var(--elevated);border-radius:var(--radius);padding:12px;
  border:1px solid var(--border);margin-top:10px;animation:fadeIn .2s;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.text-opts input[type=text],.text-opts select{
  width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--base);color:var(--t1);font:400 13px/1 'DM Sans';
  margin-bottom:8px;outline:none;
}
.text-opts input[type=text]:focus,.text-opts select:focus{border-color:var(--accent)}
.opt-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.opt-row label{font:500 11px/1 'DM Sans';color:var(--t2);min-width:36px}
.opt-row input[type=range]{flex:1;accent-color:var(--accent)}
.opt-row .rv{font:500 12px/1 'JetBrains Mono';color:var(--accent);min-width:24px;text-align:right}
.act-btn{
  width:100%;padding:10px;border-radius:8px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#38BDF8,#818CF8);color:#fff;
  font:600 13px/1 'DM Sans';transition:all .2s;
}
.act-btn:hover{box-shadow:0 4px 16px #38BDF844;transform:translateY(-1px)}

.upload-drop{
  border:2px dashed var(--border2);border-radius:var(--radius);padding:18px;
  text-align:center;cursor:pointer;transition:all .2s;margin-top:10px;
}
.upload-drop:hover{border-color:var(--accent);background:var(--accent-bg)}
.upload-drop .ud-icon{font-size:26px;margin-bottom:4px}
.upload-drop p{font-size:11px;color:var(--t3)}

.fab-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fab-chip{
  padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--elevated);color:var(--t2);cursor:pointer;text-align:left;
  transition:all .2s;font-family:'DM Sans',sans-serif;
}
.fab-chip:hover{border-color:var(--border2)}
.fab-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.fab-chip .fn{font-size:12px;font-weight:500}
.fab-chip .fp{font:400 10px/1 'JetBrains Mono';opacity:.6;margin-top:2px}

.size-row{display:flex;gap:5px}
.size-chip{
  flex:1;padding:7px;border-radius:7px;border:1.5px solid var(--border);
  background:transparent;color:var(--t2);cursor:pointer;font:600 12px/1 'DM Sans';
  text-align:center;transition:all .2s;
}
.size-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

.qty-row{display:flex;align-items:center;gap:10px}
.qty-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--elevated);color:var(--accent);cursor:pointer;font-size:18px;
  display:grid;place-items:center;transition:all .15s;
}
.qty-btn:hover{background:var(--hover)}
.qty-num{font:700 18px/1 'JetBrains Mono';color:var(--accent);min-width:32px;text-align:center}
.bulk-pill{font:600 10px/1 'DM Sans';color:var(--green);background:#34D39912;padding:3px 8px;border-radius:20px;margin-left:auto;display:none}

/* Center */
.d-center{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:radial-gradient(ellipse 70% 55% at 45% 48%,#0E1628,transparent 70%),var(--deep);
}
.d-center .grid-bg{
  position:absolute;inset:0;opacity:.025;pointer-events:none;
  background-image:linear-gradient(var(--accent) 1px,transparent 1px),linear-gradient(90deg,var(--accent) 1px,transparent 1px);
  background-size:50px 50px;
}
.canvas-container{position:relative;width:480px;height:520px}
.mockup-bg{
  position:absolute;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.mockup-bg img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 12px 28px rgba(0,0,0,.5))}
.mockup-bg .no-mockup{
  text-align:center;color:var(--t3);
}
.mockup-bg .no-mockup .nm-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.mockup-bg .no-mockup p{font-size:12px;max-width:200px;line-height:1.5}
.mockup-bg .no-mockup .nm-link{color:var(--accent);cursor:pointer;text-decoration:underline}
#designCanvas{position:absolute;top:0;left:0;z-index:2}
.zone-indicator{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:3;
  font:500 10px/1 'DM Sans';letter-spacing:2px;text-transform:uppercase;
  color:var(--t3);background:var(--deep);padding:5px 16px;border-radius:20px;
  border:1px solid var(--border);pointer-events:none;
}

/* Right panel */
.d-right{
  width:244px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.price-box{background:var(--elevated);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.p-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.p-row .pl{color:var(--t2)}.p-row .pv{color:var(--t1);font:500 12px/1 'JetBrains Mono'}
.p-row .pv.acc{color:var(--orange)}.p-row .pv.grn{color:var(--green)}
.p-div{border-top:1px solid var(--border);margin:8px 0}
.p-row.total{border-top:1px dashed var(--border);margin-top:8px;padding-top:10px}
.p-row.total .pl{font-weight:600;color:var(--t1);font-size:13px}
.p-row.total .pv{color:var(--accent);font:700 16px/1 'JetBrains Mono'}

.status-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px}
.s-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
.s-dot.on{background:var(--green);box-shadow:0 0 8px #34D39955}
.cfg-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px;line-height:1.9}
.cfg-row .cl{color:var(--t3)}.cfg-row .cv{color:var(--t1)}

.cart-btn{
  width:100%;padding:16px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,#38BDF8 0%,#818CF8 50%,#C084FC 100%);
  color:#fff;font:700 14px/1 'Sora';letter-spacing:.5px;transition:all .25s;
  box-shadow:0 6px 24px #38BDF833;
}
.cart-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px #38BDF855}

input[type=color]{-webkit-appearance:none;border:none;width:32px;height:28px;border-radius:6px;cursor:pointer;background:transparent;padding:0}
input[type=color]::-webkit-color-swatch-wrapper{padding:2px}
input[type=color]::-webkit-color-swatch{border:1px solid var(--border);border-radius:4px}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-badge">TC</div>
      <div><h1>ThreadCraft</h1><small>Design Studio</small></div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPage('admin')">Admin Panel</button>
      <button class="nav-tab" onclick="switchPage('designer')">Designer</button>
    </div>
    <div class="topbar-right" id="topActions"></div>
  </div>

  <div class="main">

    <!-- ════ ADMIN PAGE ════ -->
    <div class="page active" id="page-admin">
      <div class="admin-header">
        <div>
          <h2>Mockup Image Manager</h2>
          <p>Upload real t-shirt photos for each category, color, and view. Designer will use these as backgrounds.</p>
        </div>
      </div>
      <div class="stats-row" id="adminStats"></div>
      <div class="filter-bar" id="adminFilters"></div>
      <div class="upload-grid" id="adminGrid"></div>
    </div>

    <!-- ════ DESIGNER PAGE ════ -->
    <div class="page" id="page-designer">
      <div class="designer">

        <!-- Left Panel -->
        <div class="d-left">
          <div class="d-section">
            <div class="d-label">T-shirt type</div>
            <div class="type-row" id="dTypes"></div>
          </div>
          <div class="d-section">
            <div class="d-label">Color</div>
            <div class="color-row" id="dColors"></div>
          </div>
          <div class="d-section">
            <div class="d-label">Print zone</div>
            <div class="zone-row" id="dZones"></div>
          </div>
          <div class="d-section">
            <div class="d-label">Design tools</div>
            <div class="tool-grid" id="dTools"></div>
            <div id="dTextOpts"></div>
            <div id="dUploadZone"></div>
          </div>
          <div class="d-section">
            <div class="d-label">Fabric</div>
            <div class="fab-grid" id="dFabrics"></div>
          </div>
          <div class="d-section">
            <div class="d-label">Size</div>
            <div class="size-row" id="dSizes"></div>
          </div>
          <div class="d-section">
            <div class="d-label">Quantity</div>
            <div class="qty-row">
              <button class="qty-btn" onclick="chgQty(-1)">−</button>
              <span class="qty-num" id="qtyN">1</span>
              <button class="qty-btn" onclick="chgQty(1)">+</button>
              <span class="bulk-pill" id="bulkP"></span>
            </div>
          </div>
        </div>

        <!-- Center Canvas -->
        <div class="d-center">
          <div class="grid-bg"></div>
          <div class="canvas-container">
            <div class="mockup-bg" id="mockupBg"></div>
            <canvas id="designCanvas" width="480" height="520"></canvas>
            <div class="zone-indicator" id="zoneInd">FRONT VIEW</div>
          </div>
        </div>

        <!-- Right Panel -->
        <div class="d-right">
          <div class="d-section" style="flex:1">
            <div class="d-label">Live pricing</div>
            <div class="price-box" id="priceBox"></div>
          </div>
          <div class="d-section">
            <div class="d-label">Design status</div>
            <div id="statusP"></div>
          </div>
          <div class="d-section">
            <div class="d-label">Config</div>
            <div id="configP"></div>
          </div>
          <div class="d-section" style="border:none">
            <button class="cart-btn" id="cartBtn">ADD TO CART</button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<input type="file" id="adminFileInput" accept="image/*" style="display:none">
<input type="file" id="designFileInput" accept="image/*" style="display:none">

<script>
// ═══════════════════════ DATA ═══════════════════════
const TYPES=[
  {id:'round',name:'Round Neck',icon:'👕'},
  {id:'polo',name:'Polo',icon:'🎽'},
  {id:'hoodie',name:'Hoodie',icon:'🧥'},
];
const COLORS=[
  {id:'white',name:'White',hex:'#FFFFFF',light:true},
  {id:'offwhite',name:'Off White',hex:'#F5F0E8',light:true},
  {id:'black',name:'Black',hex:'#1A1A1A'},
  {id:'navy',name:'Navy',hex:'#1B2A4A'},
  {id:'charcoal',name:'Charcoal',hex:'#3D3D3D'},
  {id:'red',name:'Red',hex:'#C0392B'},
  {id:'maroon',name:'Maroon',hex:'#6B1D2A'},
  {id:'forest',name:'Forest',hex:'#1E6F50'},
  {id:'olive',name:'Olive',hex:'#5C6B3C'},
  {id:'sky',name:'Sky Blue',hex:'#5DADE2'},
  {id:'royal',name:'Royal Blue',hex:'#2C5FE0'},
  {id:'mustard',name:'Mustard',hex:'#D4A836',light:true},
];
const VIEWS=['front','back'];
const ZONES={front:'Front',back:'Back',pocket:'Pocket'};
const FABRICS=[
  {id:'cotton',name:'Cotton',price:299},
  {id:'polyester',name:'Polyester',price:249},
  {id:'polycotton',name:'Polycotton',price:279},
  {id:'matt',name:'Matt Finish',price:319},
];
const SIZES=['S','M','L','XL','XXL'];
const SIZE_M={S:1,M:1,L:1.05,XL:1.1,XXL:1.15};
const FONTS=['Arial','Georgia','Impact','Courier New','Trebuchet MS','Verdana','Times New Roman','Comic Sans MS'];
const TOOLS=[
  {id:'text',icon:'T',label:'Text'},
  {id:'image',icon:'📷',label:'Upload'},
  {id:'rect',icon:'▢',label:'Rect'},
  {id:'circle',icon:'●',label:'Circle'},
  {id:'triangle',icon:'△',label:'Triangle'},
  {id:'line',icon:'╱',label:'Line'},
];

// ═══════════════════════ STATE ═══════════════════════
// Mockup images store: { "round_white_front": dataURL, ... }
let mockupStore = {};
try{mockupStore=JSON.parse(localStorage.getItem('tc_mockups')||'{}');}catch(e){}

let adminFilter={type:'all',color:'all'};

let ds={
  type:TYPES[0],color:COLORS[0],zone:'front',
  fabric:FABRICS[0],size:'M',qty:1,
  tool:null,textVal:'Your Text',font:'Arial',textColor:'#1A1A1A',fontSize:28,
  designs:{front:false,back:false,pocket:false},
};
let fCanvas,history=[],hIdx=-1,hLock=false;
let savedZones={front:null,back:null,pocket:null};
let currentPage='admin';

// ═══════════════════════ INIT ═══════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  buildAdmin();
  buildDesigner();
  initFabricCanvas();
});

// ═══════════════════════ PAGE SWITCH ═══════════════════════
function switchPage(p){
  currentPage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    t.classList.toggle('active',i===(p==='admin'?0:1));
  });
  buildTopActions();
  if(p==='designer'){updateMockupBg();fCanvas&&fCanvas.renderAll();}
}

function buildTopActions(){
  const ta=document.getElementById('topActions');
  if(currentPage==='designer'){
    ta.innerHTML=`
      <button class="top-btn" onclick="undo()">↩ Undo</button>
      <button class="top-btn" onclick="redo()">↪ Redo</button>
      <button class="top-btn" onclick="dupSel()">⧉ Clone</button>
      <button class="top-btn warn" onclick="delSel()">🗑 Delete</button>
      <button class="top-btn warn" onclick="clearAll()">✕ Clear</button>
      <button class="top-btn primary" onclick="exportPNG()">↓ Export</button>`;
  } else {
    ta.innerHTML=`
      <button class="top-btn primary" onclick="switchPage('designer')">→ Open Designer</button>`;
  }
}
buildTopActions();

// ═══════════════════════ ADMIN PANEL ═══════════════════════
function mockupKey(typeId,colorId,view){return `${typeId}_${colorId}_${view}`}

function buildAdmin(){
  buildAdminStats();
  buildAdminFilters();
  buildAdminGrid();
}

function buildAdminStats(){
  const total=TYPES.length*COLORS.length*VIEWS.length;
  const uploaded=Object.keys(mockupStore).length;
  document.getElementById('adminStats').innerHTML=`
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Total Slots</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${uploaded}</div><div class="stat-label">Uploaded</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--orange)">${total-uploaded}</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-val">${Math.round(uploaded/total*100)}%</div><div class="stat-label">Coverage</div></div>`;
}

function buildAdminFilters(){
  const f=document.getElementById('adminFilters');
  f.innerHTML=`
    <span class="filter-label">Type</span>
    <button class="filter-chip ${adminFilter.type==='all'?'active':''}" onclick="setAdminFilter('type','all')">All</button>
    ${TYPES.map(t=>`<button class="filter-chip ${adminFilter.type===t.id?'active':''}" onclick="setAdminFilter('type','${t.id}')">${t.icon} ${t.name}</button>`).join('')}
    <span style="width:16px"></span>
    <span class="filter-label">Color</span>
    <button class="filter-chip ${adminFilter.color==='all'?'active':''}" onclick="setAdminFilter('color','all')">All</button>
    ${COLORS.slice(0,6).map(c=>`<button class="filter-chip ${adminFilter.color===c.id?'active':''}" onclick="setAdminFilter('color','${c.id}')"><span class="color-dot-small" style="background:${c.hex}"></span>${c.name}</button>`).join('')}
  `;
}

function setAdminFilter(key,val){
  adminFilter[key]=val;
  buildAdminFilters();
  buildAdminGrid();
}

function buildAdminGrid(){
  const g=document.getElementById('adminGrid');
  let html='';
  const types=adminFilter.type==='all'?TYPES:TYPES.filter(t=>t.id===adminFilter.type);
  const colors=adminFilter.color==='all'?COLORS:COLORS.filter(c=>c.id===adminFilter.color);

  types.forEach(type=>{
    colors.forEach(color=>{
      VIEWS.forEach(view=>{
        const key=mockupKey(type.id,color.id,view);
        const has=!!mockupStore[key];
        html+=`
          <div class="mockup-card">
            <div class="card-header">
              <div>
                <div class="card-title">${type.icon} ${type.name} — ${color.name}</div>
                <div class="card-sub">${view.toUpperCase()} view</div>
              </div>
              <span class="card-badge ${has?'uploaded':'pending'}">${has?'✓ Uploaded':'Pending'}</span>
            </div>
            <div class="mockup-preview" id="prev_${key}">
              ${has
                ?`<img src="${mockupStore[key]}" alt="${type.name} ${color.name} ${view}">`
                :`<div class="placeholder"><div class="ph-icon">📸</div><p>No mockup uploaded yet</p></div>`
              }
            </div>
            <div class="card-actions">
              <button class="card-btn upload-btn" onclick="adminUpload('${key}')">
                ${has?'🔄 Replace':'📤 Upload Image'}
              </button>
              ${has?`<button class="card-btn remove-btn" onclick="adminRemove('${key}')">🗑 Remove</button>`:''}
            </div>
          </div>`;
      });
    });
  });
  g.innerHTML=html;
}

let pendingAdminKey=null;
function adminUpload(key){
  pendingAdminKey=key;
  document.getElementById('adminFileInput').click();
}
document.getElementById('adminFileInput').addEventListener('change',function(e){
  const file=e.target.files?.[0];
  if(!file||!pendingAdminKey)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    mockupStore[pendingAdminKey]=ev.target.result;
    try{localStorage.setItem('tc_mockups',JSON.stringify(mockupStore));}catch(e){}
    buildAdmin();
    if(currentPage==='designer')updateMockupBg();
  };
  reader.readAsDataURL(file);
  e.target.value='';
});
function adminRemove(key){
  delete mockupStore[key];
  try{localStorage.setItem('tc_mockups',JSON.stringify(mockupStore));}catch(e){}
  buildAdmin();
}

// ═══════════════════════ DESIGNER ═══════════════════════
function buildDesigner(){
  // Types
  document.getElementById('dTypes').innerHTML=TYPES.map(t=>`
    <button class="type-chip ${ds.type.id===t.id?'active':''}" onclick="dSetType('${t.id}')">
      <div class="tc-icon">${t.icon}</div><div class="tc-name">${t.name}</div>
    </button>`).join('');

  // Colors - mark those without images
  document.getElementById('dColors').innerHTML=COLORS.map(c=>{
    const key=mockupKey(ds.type.id,c.id,ds.zone==='pocket'?'front':ds.zone);
    const hasImg=!!mockupStore[key];
    return `<div class="color-sw ${ds.color.id===c.id?'active':''} ${c.light?'is-light':''} ${!hasImg?'no-img':''}"
                 style="background:${c.hex}" title="${c.name}${!hasImg?' (no mockup)':''}"
                 onclick="dSetColor('${c.id}')"></div>`;
  }).join('');

  // Zones
  const hasBack=!!mockupStore[mockupKey(ds.type.id,ds.color.id,'back')];
  document.getElementById('dZones').innerHTML=Object.entries(ZONES).map(([k,v])=>`
    <button class="zone-chip ${ds.zone===k?'active':''}" onclick="dSetZone('${k}')">${v}</button>`).join('');

  // Tools
  document.getElementById('dTools').innerHTML=TOOLS.map(t=>`
    <button class="tool-btn ${ds.tool===t.id?'active':''}" onclick="dSetTool('${t.id}')" id="dt_${t.id}">
      <div class="ti">${t.icon}</div><div class="tl">${t.label}</div>
    </button>`).join('');

  // Text opts
  if(ds.tool==='text'){
    document.getElementById('dTextOpts').innerHTML=`
      <div class="text-opts">
        <input type="text" value="${ds.textVal}" oninput="ds.textVal=this.value" placeholder="Enter text...">
        <select onchange="ds.font=this.value">${FONTS.map(f=>`<option ${ds.font===f?'selected':''}>${f}</option>`).join('')}</select>
        <div class="opt-row"><label>Size</label><input type="range" min="12" max="80" value="${ds.fontSize}" oninput="ds.fontSize=+this.value;this.nextElementSibling.textContent=this.value"><span class="rv">${ds.fontSize}</span></div>
        <div class="opt-row"><label>Color</label><input type="color" value="${ds.textColor}" oninput="ds.textColor=this.value"></div>
        <button class="act-btn" onclick="addText()">✦ Add text to canvas</button>
      </div>`;
  } else document.getElementById('dTextOpts').innerHTML='';

  // Upload zone
  if(ds.tool==='image'){
    document.getElementById('dUploadZone').innerHTML=`
      <div class="upload-drop" onclick="document.getElementById('designFileInput').click()">
        <div class="ud-icon">📁</div><p>Click to upload your logo or design<br>PNG, SVG, JPG — Max 5MB</p>
      </div>`;
  } else document.getElementById('dUploadZone').innerHTML='';

  // Fabrics
  document.getElementById('dFabrics').innerHTML=FABRICS.map(f=>`
    <button class="fab-chip ${ds.fabric.id===f.id?'active':''}" onclick="dSetFabric('${f.id}')">
      <div class="fn">${f.name}</div><div class="fp">₹${f.price}</div>
    </button>`).join('');

  // Sizes
  document.getElementById('dSizes').innerHTML=SIZES.map(s=>`
    <button class="size-chip ${ds.size===s?'active':''}" onclick="dSetSize('${s}')">${s}</button>`).join('');

  updateMockupBg();
  updatePricing();
  updateStatus();
  updateConfig();
}

function initFabricCanvas(){
  fCanvas=new fabric.Canvas('designCanvas',{
    width:480,height:520,backgroundColor:'transparent',
    selection:true,preserveObjectStacking:true,
  });
  fCanvas.on('object:modified',()=>pushH());
  fCanvas.on('selection:created',()=>{updatePricing();updateConfig()});
  fCanvas.on('selection:updated',()=>{updatePricing();updateConfig()});
  fCanvas.on('selection:cleared',()=>{updatePricing();updateConfig()});
  drawGuide();
  pushH();
}

function drawGuide(){
  fCanvas.getObjects().filter(o=>o._g).forEach(o=>fCanvas.remove(o));
  const zones={
    front:{x:148,y:130,w:185,h:260},
    back:{x:148,y:130,w:185,h:260},
    pocket:{x:152,y:155,w:72,h:72},
  };
  const z=zones[ds.zone];
  const r=new fabric.Rect({
    left:z.x,top:z.y,width:z.w,height:z.h,
    fill:'transparent',stroke:'#38BDF844',strokeDashArray:[6,4],
    strokeWidth:1.2,selectable:false,evented:false,rx:6,ry:6,
  });
  r._g=true;
  fCanvas.add(r);fCanvas.sendToBack(r);fCanvas.renderAll();
}

function updateMockupBg(){
  const view=ds.zone==='pocket'?'front':ds.zone;
  const key=mockupKey(ds.type.id,ds.color.id,view);
  const img=mockupStore[key];
  const el=document.getElementById('mockupBg');
  if(img){
    el.innerHTML=`<img src="${img}" alt="mockup">`;
  } else {
    el.innerHTML=`
      <div class="no-mockup">
        <div class="nm-icon">👕</div>
        <p>No mockup image for<br><strong>${ds.type.name} — ${ds.color.name} — ${view}</strong></p>
        <p style="margin-top:8px"><span class="nm-link" onclick="switchPage('admin')">Go to Admin Panel</span> to upload</p>
      </div>`;
  }
  document.getElementById('zoneInd').textContent=ZONES[ds.zone].toUpperCase()+' VIEW';
}

// ── SETTERS ──
function dSetType(id){ds.type=TYPES.find(t=>t.id===id);buildDesigner()}
function dSetColor(id){ds.color=COLORS.find(c=>c.id===id);buildDesigner()}
function dSetZone(z){
  savedZones[ds.zone]=fCanvas.toJSON(['_g']);
  ds.zone=z;
  fCanvas.clear();fCanvas.backgroundColor='transparent';
  if(savedZones[z]){
    hLock=true;
    fCanvas.loadFromJSON(savedZones[z],()=>{
      fCanvas.getObjects().filter(o=>o._g).forEach(o=>fCanvas.remove(o));
      drawGuide();fCanvas.renderAll();hLock=false;
    });
  } else drawGuide();
  buildDesigner();
}
function dSetFabric(id){ds.fabric=FABRICS.find(f=>f.id===id);buildDesigner()}
function dSetSize(s){ds.size=s;buildDesigner()}
function chgQty(d){
  ds.qty=Math.max(1,ds.qty+d);
  document.getElementById('qtyN').textContent=ds.qty;
  const b=document.getElementById('bulkP');
  if(ds.qty>=50){b.style.display='';b.textContent='−20% bulk'}
  else if(ds.qty>=11){b.style.display='';b.textContent='−10% bulk'}
  else if(ds.qty>=5){b.style.display='';b.textContent='−5% bulk'}
  else b.style.display='none';
  updatePricing();updateConfig();
}
function dSetTool(id){
  if(ds.tool===id&&(id==='text'||id==='image'))ds.tool=null;
  else{
    ds.tool=id;
    if(['rect','circle','triangle','line'].includes(id)){addShape(id);ds.tool=null}
  }
  buildDesigner();
}

// ── CANVAS ACTIONS ──
function addText(){
  const zn={front:{x:148,y:130,w:185,h:260},back:{x:148,y:130,w:185,h:260},pocket:{x:152,y:155,w:72,h:72}};
  const z=zn[ds.zone];
  const t=new fabric.IText(ds.textVal||'Your Text',{
    left:z.x+z.w/2-50,top:z.y+z.h/2-15,
    fontSize:ds.zone==='pocket'?Math.min(ds.fontSize,16):ds.fontSize,
    fontFamily:ds.font,fill:ds.textColor,editable:true,
  });
  fCanvas.add(t);fCanvas.setActiveObject(t);fCanvas.renderAll();mark();pushH();
}

document.getElementById('designFileInput').addEventListener('change',function(e){
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    fabric.Image.fromURL(ev.target.result,(img)=>{
      const zn={front:{x:148,y:130,w:185,h:260},back:{x:148,y:130,w:185,h:260},pocket:{x:152,y:155,w:72,h:72}};
      const z=zn[ds.zone];
      const sc=Math.min((z.w-16)/img.width,(z.h-16)/img.height,1);
      img.set({left:z.x+z.w/2-(img.width*sc)/2,top:z.y+z.h/2-(img.height*sc)/2,scaleX:sc,scaleY:sc});
      fCanvas.add(img);fCanvas.setActiveObject(img);fCanvas.renderAll();mark();pushH();
    });
  };
  reader.readAsDataURL(file);e.target.value='';
});

function addShape(type){
  const zn={front:{x:148,y:130,w:185,h:260},back:{x:148,y:130,w:185,h:260},pocket:{x:152,y:155,w:72,h:72}};
  const z=zn[ds.zone];const s=ds.zone==='pocket'?28:55;
  const cx=z.x+z.w/2-s/2,cy=z.y+z.h/2-s/2;
  let shape;
  if(type==='rect')shape=new fabric.Rect({left:cx,top:cy,width:s*1.3,height:s,fill:'#38BDF8',rx:4,ry:4});
  else if(type==='circle')shape=new fabric.Circle({left:cx,top:cy,radius:s/2,fill:'#818CF8'});
  else if(type==='triangle')shape=new fabric.Triangle({left:cx,top:cy,width:s,height:s,fill:'#F59E0B'});
  else if(type==='line')shape=new fabric.Line([z.x+10,z.y+z.h/2,z.x+z.w-10,z.y+z.h/2],{stroke:'#EF4444',strokeWidth:3});
  if(shape){fCanvas.add(shape);fCanvas.setActiveObject(shape);fCanvas.renderAll();mark();pushH()}
}

function delSel(){
  const o=fCanvas.getActiveObject();if(!o||o._g)return;
  if(o.type==='activeSelection')o.forEachObject(x=>{if(!x._g)fCanvas.remove(x)});
  else fCanvas.remove(o);
  fCanvas.discardActiveObject();fCanvas.renderAll();mark();pushH();
}
function dupSel(){
  const o=fCanvas.getActiveObject();if(!o||o._g)return;
  o.clone(c=>{c.set({left:o.left+14,top:o.top+14});fCanvas.add(c);fCanvas.setActiveObject(c);fCanvas.renderAll();mark();pushH()});
}
function clearAll(){
  fCanvas.getObjects().filter(o=>!o._g).forEach(o=>fCanvas.remove(o));
  fCanvas.discardActiveObject();fCanvas.renderAll();mark();pushH();
}
function exportPNG(){
  const d=fCanvas.toDataURL({format:'png',quality:1,multiplier:2});
  const a=document.createElement('a');a.download=`threadcraft-${ds.type.id}-${ds.zone}.png`;a.href=d;a.click();
}

// History
function pushH(){if(hLock)return;history=history.slice(0,hIdx+1);history.push(JSON.stringify(fCanvas.toJSON(['_g'])));hIdx=history.length-1}
function undo(){if(hIdx<=0)return;hIdx--;hLock=true;fCanvas.loadFromJSON(JSON.parse(history[hIdx]),()=>{fCanvas.renderAll();hLock=false})}
function redo(){if(hIdx>=history.length-1)return;hIdx++;hLock=true;fCanvas.loadFromJSON(JSON.parse(history[hIdx]),()=>{fCanvas.renderAll();hLock=false})}

function mark(){
  ds.designs[ds.zone]=fCanvas.getObjects().filter(o=>!o._g).length>0;
  updateStatus();updatePricing();
}

// ── PRICING ──
function calcPrice(){
  let base=Math.round(ds.fabric.price*SIZE_M[ds.size]);
  let add=0;
  if(ds.designs.front)add+=80;if(ds.designs.back)add+=100;if(ds.designs.pocket)add+=50;
  if(ds.type.id==='polo')add+=60;if(ds.type.id==='hoodie')add+=150;
  let unit=base+add,disc=0;
  if(ds.qty>=50)disc=20;else if(ds.qty>=11)disc=10;else if(ds.qty>=5)disc=5;
  let after=Math.round(unit*(1-disc/100));
  return{base,add,unit,disc,after,total:after*ds.qty};
}
function updatePricing(){
  const p=calcPrice();
  document.getElementById('priceBox').innerHTML=`
    <div class="p-row"><span class="pl">Base (${ds.fabric.name})</span><span class="pv">₹${ds.fabric.price}</span></div>
    <div class="p-row"><span class="pl">Size ×${SIZE_M[ds.size]}</span><span class="pv">₹${p.base}</span></div>
    ${ds.type.id!=='round'?`<div class="p-row"><span class="pl">${ds.type.name}</span><span class="pv acc">+₹${ds.type.id==='polo'?60:150}</span></div>`:''}
    ${ds.designs.front?'<div class="p-row"><span class="pl">Front print</span><span class="pv acc">+₹80</span></div>':''}
    ${ds.designs.back?'<div class="p-row"><span class="pl">Back print</span><span class="pv acc">+₹100</span></div>':''}
    ${ds.designs.pocket?'<div class="p-row"><span class="pl">Pocket logo</span><span class="pv acc">+₹50</span></div>':''}
    <div class="p-div"></div>
    <div class="p-row"><span class="pl">Unit price</span><span class="pv" style="font-weight:600">₹${p.unit}</span></div>
    ${p.disc?`<div class="p-row"><span class="pl">Bulk discount</span><span class="pv grn">−${p.disc}%</span></div><div class="p-row"><span class="pl">After discount</span><span class="pv">₹${p.after}</span></div>`:''}
    <div class="p-row total"><span class="pl">Total (×${ds.qty})</span><span class="pv">₹${p.total.toLocaleString('en-IN')}</span></div>`;
  document.getElementById('cartBtn').innerHTML=`ADD TO CART — <span style="font-family:'JetBrains Mono'">₹${p.total.toLocaleString('en-IN')}</span>`;
}
function updateStatus(){
  document.getElementById('statusP').innerHTML=['front','back','pocket'].map(z=>`
    <div class="status-item">
      <div class="s-dot ${ds.designs[z]?'on':''}"></div>
      <span style="color:${ds.designs[z]?'var(--t1)':'var(--t3)'}">${ZONES[z]}</span>
      <span style="margin-left:auto;font-size:10px;color:${ds.designs[z]?'var(--green)':'var(--t3)'}">
        ${ds.designs[z]?'✓ designed':'empty'}
      </span>
    </div>`).join('');
}
function updateConfig(){
  document.getElementById('configP').innerHTML=`
    <div class="cfg-row"><span class="cl">Type</span><span class="cv">${ds.type.name}</span></div>
    <div class="cfg-row"><span class="cl">Color</span><span class="cv">${ds.color.name}</span></div>
    <div class="cfg-row"><span class="cl">Fabric</span><span class="cv">${ds.fabric.name}</span></div>
    <div class="cfg-row"><span class="cl">Size</span><span class="cv">${ds.size}</span></div>
    <div class="cfg-row"><span class="cl">Qty</span><span class="cv">${ds.qty}</span></div>`;
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(currentPage!=='designer')return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='Delete'||e.key==='Backspace')delSel();
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo()}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo()}
  if(e.ctrlKey&&e.key==='d'){e.preventDefault();dupSel()}
});
</script>
</body>
</html>
